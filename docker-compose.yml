version: '3.8'

services:
  learnhub:
    build: .
    image: learnhub:latest
    container_name: learnhub
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:/data/learnhub.db
      - AUTH_PASSWORD=${AUTH_PASSWORD}
      - AUTH_SECRET=${AUTH_SECRET}
      - AGENT_API_KEY=${AGENT_API_KEY}
      - NEXT_PUBLIC_SITE_TITLE=${NEXT_PUBLIC_SITE_TITLE:-LearnHub}
      - NODE_ENV=production
    volumes:
      - learnhub_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  learnhub_data:
    driver: local
